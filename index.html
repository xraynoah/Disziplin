<html lang="de">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0F1A;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@keyframes stepPop{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
input::placeholder,textarea::placeholder{color:#4B5563}
select{color-scheme:dark}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
textarea{resize:vertical}
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type="file"]{display:none}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;
const DAYS_DE=["Mo","Di","Mi","Do","Fr","Sa","So"];
const MONTHS_DE=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const DEFAULT_HABITS=[{id:"steps",label:"10.000 Schritte",icon:"🚶",color:"#F59E0B"},{id:"water",label:"2 Liter trinken",icon:"💧",color:"#3B82F6"},{id:"sport",label:"Sport-Session",icon:"💪",color:"#EF4444"},{id:"learn",label:"Lern-Session",icon:"📚",color:"#8B5CF6"},{id:"house",label:"Haushalt",icon:"🏠",color:"#10B981"}];
const DEFAULT_GOALS={sweetLimit:2,kcal:2300,protein:160,carbs:260,fat:65,waterGlasses:8,weightGoal:74,weightStart:80,sleepGoal:8,stepGoal:10000,stepIncrement:2000,userName:""};
const STORE_KEY="disziplin-dashboard-v3",GOALS_KEY="disziplin-goals-v1",JOURNAL_PW_KEY="disziplin-journal-pw";
function loadGoals(){try{const d=localStorage.getItem(GOALS_KEY);return d?{...DEFAULT_GOALS,...JSON.parse(d)}:DEFAULT_GOALS}catch{return DEFAULT_GOALS}}
function saveGoals(g){try{localStorage.setItem(GOALS_KEY,JSON.stringify(g))}catch{}}
function load(){try{const d=localStorage.getItem(STORE_KEY);return d?JSON.parse(d):null}catch{return null}}
function save(d){try{localStorage.setItem(STORE_KEY,JSON.stringify(d))}catch{}}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function isSame(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function firstDay(y,m){const d=new Date(y,m,1).getDay();return d===0?6:d-1}
async function hashPw(pw){const e=new TextEncoder().encode(pw);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function downloadICS(task,date){const ds=dk(date).replace(/-/g,''),st=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';let tb;if(task.time){const[h,m]=task.time.split(':');tb=`DTSTART:${ds}T${h}${m}00\nDTEND:${ds}T${String(Math.min(23,+h+1)).padStart(2,'0')}${m}00`}else tb=`DTSTART;VALUE=DATE:${ds}\nDTEND;VALUE=DATE:${ds}`;const ics=`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Disziplin//DE\nBEGIN:VEVENT\n${tb}\nDTSTAMP:${st}\nUID:${task.id}@disziplin\nSUMMARY:${task.text}\nEND:VEVENT\nEND:VCALENDAR`;const b=new Blob([ics],{type:'text/calendar'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=task.text.replace(/[^a-zA-Z0-9äöüÄÖÜß ]/g,'').substring(0,30)+'.ics';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function downloadAllICS(tasks,date){const ds=dk(date).replace(/-/g,''),st=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';let ev='';tasks.forEach(t=>{let tb;if(t.time){const[h,m]=t.time.split(':');tb=`DTSTART:${ds}T${h}${m}00\nDTEND:${ds}T${String(Math.min(23,+h+1)).padStart(2,'0')}${m}00`}else tb=`DTSTART;VALUE=DATE:${ds}\nDTEND;VALUE=DATE:${ds}`;ev+=`BEGIN:VEVENT\n${tb}\nDTSTAMP:${st}\nUID:${t.id}@disziplin\nSUMMARY:${t.text}\nEND:VEVENT\n`});const b=new Blob([`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Disziplin//DE\n${ev}END:VCALENDAR`],{type:'text/calendar'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`termine-${dk(date)}.ics`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}

function FoodPhotoEstimator({onEstimate}){
  const[analyzing,setAnalyzing]=useState(false);const[preview,setPreview]=useState(null);const[result,setResult]=useState(null);const[error,setError]=useState(null);const fileRef=useRef(null);
  const analyze=async(file)=>{setAnalyzing(true);setError(null);setResult(null);try{const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});const mt=file.type||'image/jpeg';setPreview(`data:${mt};base64,${b64}`);const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:'Schätze die Nährwerte dieses Essens. Antworte NUR mit JSON (kein Markdown):\n{"name":"Name","kcal":Zahl,"protein":Zahl,"carbs":Zahl,"fat":Zahl}\nKein Essen? {"error":"Kein Essen erkannt"}'}]}]})});const data=await resp.json();const text=data.content?.map(i=>i.text||'').join('')||'';const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());if(parsed.error)setError(parsed.error);else setResult(parsed)}catch(e){setError('Analyse fehlgeschlagen.');console.error(e)}setAnalyzing(false)};
  const sty={wrap:{background:'#0D1B2A',border:'1px dashed #374151',borderRadius:12,padding:16,textAlign:'center',marginBottom:12},btn:{background:'linear-gradient(135deg,#F59E0B,#D97706)',border:'none',borderRadius:10,padding:'12px 20px',color:'#000',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:"'DM Sans'",display:'inline-flex',alignItems:'center',gap:8},ok:{background:'#10B981',border:'none',borderRadius:8,padding:'10px 20px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',width:'100%'},no:{background:'transparent',border:'1px solid #374151',borderRadius:8,padding:'8px 16px',color:'#6B7280',fontSize:12,cursor:'pointer',marginTop:8,width:'100%'},mv:{fontSize:20,fontWeight:700,fontFamily:"'Playfair Display',serif"}};
  return(<div style={sty.wrap}><input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={e=>{const f=e.target.files?.[0];if(f)analyze(f)}}/>
    {!preview&&!analyzing&&<div><div style={{fontSize:32,marginBottom:8}}>📸</div><button onClick={()=>fileRef.current?.click()} style={sty.btn}>📷 Essen fotografieren</button><div style={{fontSize:11,color:'#4B5563',marginTop:8}}>KI schätzt automatisch die Nährwerte</div></div>}
    {preview&&<img src={preview} alt="Food" style={{width:'100%',maxHeight:200,objectFit:'cover',borderRadius:8,marginBottom:12}}/>}
    {analyzing&&<div style={{padding:20}}><div style={{fontSize:28,animation:'pulse 1.5s ease infinite'}}>🔍</div><div style={{fontSize:13,color:'#F59E0B',marginTop:8}}>Analysiere Essen...</div></div>}
    {error&&<div style={{color:'#EF4444',fontSize:13,marginTop:12}}>❌ {error}<button onClick={()=>{setError(null);setPreview(null)}} style={sty.no}>Nochmal</button></div>}
    {result&&<div style={{background:'#111827',borderRadius:10,padding:14,marginTop:12,textAlign:'left'}}><div style={{fontSize:16,fontWeight:700,color:'#F9FAFB',marginBottom:10}}>{result.name}</div><div style={{display:'flex',justifyContent:'space-around',marginBottom:12}}>{[{v:result.kcal,l:'kcal',c:'#F59E0B'},{v:result.protein+'g',l:'Protein',c:'#EF4444'},{v:result.carbs+'g',l:'Carbs',c:'#3B82F6'},{v:result.fat+'g',l:'Fett',c:'#10B981'}].map(x=><div key={x.l} style={{textAlign:'center'}}><div style={{...sty.mv,color:x.c}}>{x.v}</div><div style={{fontSize:10,color:'#6B7280',marginTop:2}}>{x.l}</div></div>)}</div><button onClick={()=>{onEstimate(result);setResult(null);setPreview(null)}} style={sty.ok}>✓ Übernehmen</button><button onClick={()=>{setResult(null);setPreview(null)}} style={sty.no}>Verwerfen</button></div>}
  </div>);
}

function StepCounter({steps,onChange,stepGoal,stepIncrement}){
  const[anim,setAnim]=useState(false);const pct=Math.min((steps/stepGoal)*100,100);const segs=Math.ceil(stepGoal/stepIncrement);const filled=Math.floor(steps/stepIncrement);const r=52,circ=2*Math.PI*r;
  return(<div style={{background:'#111827',borderRadius:12,padding:16,marginBottom:12}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><span style={{fontSize:14,fontWeight:700,color:'#E5E7EB'}}>👟 Schritte</span><span style={{fontSize:12,color:'#6B7280'}}>Ziel: {stepGoal.toLocaleString('de-DE')}</span></div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:20,marginBottom:16}}>
      <button onClick={()=>onChange(Math.max(steps-stepIncrement,0))} disabled={steps<=0} style={{width:44,height:44,borderRadius:'50%',border:'2px solid #374151',background:'transparent',color:steps<=0?'#1F2937':'#9CA3AF',fontSize:22,cursor:steps<=0?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
      <div style={{position:'relative',width:120,height:120}}>
        <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r={r} fill="none" stroke="#1F2937" strokeWidth="8"/><circle cx="60" cy="60" r={r} fill="none" stroke={pct>=100?'#10B981':'#F59E0B'} strokeWidth="8" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ-(circ*Math.min(pct,100))/100} transform="rotate(-90 60 60)" style={{transition:'all .6s'}}/></svg>
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',animation:anim?'stepPop .4s':'none'}}><div style={{fontSize:22,fontWeight:900,color:'#F9FAFB',fontFamily:"'Playfair Display',serif",lineHeight:1}}>{steps>=1000?`${(steps/1000).toFixed(steps%1000===0?0:1)}k`:steps}</div><div style={{fontSize:9,color:'#6B7280',marginTop:2}}>Schritte</div></div>
      </div>
      <button onClick={()=>{onChange(Math.min(steps+stepIncrement,stepGoal+stepIncrement));setAnim(true);setTimeout(()=>setAnim(false),500)}} style={{width:44,height:44,borderRadius:'50%',border:'none',background:'linear-gradient(135deg,#F59E0B,#D97706)',color:'#000',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,animation:anim?'pop .4s':'none'}}>+</button>
    </div>
    <div style={{display:'flex',gap:3,marginBottom:6}}>{Array.from({length:segs}).map((_,i)=><div key={i} style={{flex:1,height:6,borderRadius:3,transition:'all .3s',background:i<filled?(filled>=segs?'#10B981':'#F59E0B'):'#1F2937'}}/>)}</div>
    <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:10,color:'#4B5563'}}>0</span><span style={{fontSize:10,color:'#4B5563'}}>+{stepIncrement.toLocaleString('de-DE')} pro Klick</span><span style={{fontSize:10,color:'#4B5563'}}>{stepGoal.toLocaleString('de-DE')}</span></div>
    {steps>=stepGoal&&<div style={{textAlign:'center',marginTop:10,padding:'6px 12px',background:'#10B98118',borderRadius:8}}><span style={{fontSize:13,color:'#10B981',fontWeight:600}}>🎉 Tagesziel erreicht!</span></div>}
  </div>);
}

function Journal({data,upd,selectedDate}){
  const key=dk(selectedDate);const[unlocked,setUnlocked]=useState(false);const[pwInput,setPwInput]=useState('');const[pwError,setPwError]=useState(false);const[isSetup,setIsSetup]=useState(false);const[setupPw,setSetupPw]=useState('');const[setupConfirm,setSetupConfirm]=useState('');const[setupError,setSetupError]=useState('');const[journalText,setJournalText]=useState('');const[mood,setMood]=useState(null);const[saving,setSaving]=useState(false);
  const storedHash=localStorage.getItem(JOURNAL_PW_KEY);
  useEffect(()=>{if(unlocked){const e=data.journal?.[key];setJournalText(e?.text||'');setMood(e?.mood||null)}},[key,unlocked]);
  const doSetup=async()=>{if(setupPw.length<4){setSetupError('Mind. 4 Zeichen');return}if(setupPw!==setupConfirm){setSetupError('Stimmen nicht überein');return}localStorage.setItem(JOURNAL_PW_KEY,await hashPw(setupPw));setIsSetup(false);setUnlocked(true);setSetupPw('');setSetupConfirm('')};
  const doUnlock=async()=>{if(await hashPw(pwInput)===storedHash){setUnlocked(true);setPwError(false);setPwInput('')}else{setPwError(true);setTimeout(()=>setPwError(false),1500)}};
  const saveJ=()=>{setSaving(true);upd(d=>{if(!d.journal)d.journal={};d.journal[key]={text:journalText,mood,updatedAt:new Date().toISOString()}});setTimeout(()=>setSaving(false),800)};
  const moods=[{e:'😊',l:'Super',c:'#10B981'},{e:'🙂',l:'Gut',c:'#3B82F6'},{e:'😐',l:'Okay',c:'#F59E0B'},{e:'😔',l:'Meh',c:'#EF4444'},{e:'😤',l:'Schlecht',c:'#DC2626'}];
  const inp={background:'#0A0F1A',border:'1px solid #1F2937',borderRadius:8,padding:'12px 14px',color:'#E5E7EB',fontSize:14,fontFamily:"'DM Sans'",outline:'none',width:'100%'};
  if(!storedHash&&!isSetup)return(<div style={{animation:'fadeIn .3s'}}><div style={{background:'#111827',borderRadius:12,padding:24,textAlign:'center'}}><div style={{fontSize:48,marginBottom:12}}>🔒</div><h3 style={{fontSize:18,fontWeight:700,color:'#F9FAFB',marginBottom:8,fontFamily:"'Playfair Display',serif"}}>Privates Tagebuch</h3><p style={{fontSize:13,color:'#6B7280',marginBottom:20}}>Richte ein Passwort ein.</p><button onClick={()=>setIsSetup(true)} style={{background:'linear-gradient(135deg,#8B5CF6,#6D28D9)',border:'none',borderRadius:10,padding:'14px 28px',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>Passwort einrichten</button></div></div>);
  if(isSetup)return(<div style={{animation:'fadeIn .3s'}}><div style={{background:'#111827',borderRadius:12,padding:24}}><div style={{fontSize:32,textAlign:'center',marginBottom:12}}>🔐</div><h3 style={{fontSize:16,fontWeight:700,color:'#F9FAFB',textAlign:'center',marginBottom:16}}>Passwort einrichten</h3><input type="password" value={setupPw} onChange={e=>setSetupPw(e.target.value)} placeholder="Neues Passwort" style={{...inp,marginBottom:10}}/><input type="password" value={setupConfirm} onChange={e=>setSetupConfirm(e.target.value)} placeholder="Bestätigen" style={{...inp,marginBottom:10}} onKeyDown={e=>e.key==='Enter'&&doSetup()}/>{setupError&&<div style={{color:'#EF4444',fontSize:12,marginBottom:10}}>⚠️ {setupError}</div>}<button onClick={doSetup} style={{background:'#8B5CF6',border:'none',borderRadius:8,padding:12,width:'100%',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>Speichern</button></div></div>);
  if(!unlocked)return(<div style={{animation:'fadeIn .3s'}}><div style={{background:'#111827',borderRadius:12,padding:24,textAlign:'center'}}><div style={{fontSize:48,marginBottom:12}}>🔒</div><h3 style={{fontSize:18,fontWeight:700,color:'#F9FAFB',marginBottom:8,fontFamily:"'Playfair Display',serif"}}>Tagebuch gesperrt</h3><p style={{fontSize:13,color:'#6B7280',marginBottom:16}}>Passwort eingeben.</p><div style={{display:'flex',gap:8}}><input type="password" value={pwInput} onChange={e=>setPwInput(e.target.value)} placeholder="Passwort" style={{...inp,flex:1,animation:pwError?'shake .4s':'none',borderColor:pwError?'#EF4444':'#1F2937'}} onKeyDown={e=>e.key==='Enter'&&doUnlock()}/><button onClick={doUnlock} style={{background:'#8B5CF6',border:'none',borderRadius:8,padding:'0 20px',color:'#fff',fontSize:18,cursor:'pointer'}}>→</button></div>{pwError&&<div style={{color:'#EF4444',fontSize:12,marginTop:8}}>Falsches Passwort</div>}<button onClick={()=>{if(confirm('Passwort zurücksetzen?')){localStorage.removeItem(JOURNAL_PW_KEY);location.reload()}}} style={{background:'transparent',border:'none',color:'#374151',fontSize:11,marginTop:16,cursor:'pointer'}}>Passwort vergessen?</button></div></div>);
  const entries=data.journal||{};const recent=Object.keys(entries).sort().reverse().slice(0,5);
  return(<div style={{animation:'fadeIn .3s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><h2 style={{fontSize:15,fontWeight:700,color:'#E5E7EB'}}>📖 Tagebuch · {selectedDate.getDate()}. {MONTHS_DE[selectedDate.getMonth()]}</h2><button onClick={()=>setUnlocked(false)} style={{background:'#1F2937',border:'none',borderRadius:6,padding:'4px 10px',color:'#6B7280',fontSize:11,cursor:'pointer'}}>🔒 Sperren</button></div>
    <div style={{background:'#111827',borderRadius:12,padding:14,marginBottom:12}}><div style={{fontSize:12,color:'#6B7280',marginBottom:10}}>Wie fühlst du dich?</div><div style={{display:'flex',justifyContent:'space-around'}}>{moods.map(m=><div key={m.e} onClick={()=>setMood(m.e)} style={{cursor:'pointer',textAlign:'center',opacity:mood===m.e?1:0.4,transition:'all .2s',transform:mood===m.e?'scale(1.2)':'scale(1)'}}><div style={{fontSize:28}}>{m.e}</div><div style={{fontSize:9,color:mood===m.e?m.c:'#4B5563',marginTop:2}}>{m.l}</div></div>)}</div></div>
    <div style={{background:'#111827',borderRadius:12,padding:14,marginBottom:12}}><textarea value={journalText} onChange={e=>setJournalText(e.target.value)} placeholder="Was beschäftigt dich heute?" style={{...inp,width:'100%',minHeight:180,lineHeight:1.7,border:'none',background:'transparent',padding:0}}/><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10,borderTop:'1px solid #1F2937',paddingTop:10}}><span style={{fontSize:11,color:'#374151'}}>{journalText.length} Zeichen</span><button onClick={saveJ} style={{background:saving?'#10B981':'#8B5CF6',border:'none',borderRadius:8,padding:'8px 20px',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .3s'}}>{saving?'✓ Gespeichert':'💾 Speichern'}</button></div></div>
    {recent.length>0&&<div style={{background:'#111827',borderRadius:12,padding:14}}><div style={{fontSize:12,fontWeight:600,color:'#6B7280',marginBottom:10}}>Letzte Einträge</div>{recent.map(k=>{const en=entries[k];const d=new Date(k+'T12:00:00');return(<div key={k} style={{padding:'8px 0',borderBottom:'1px solid #1F2937',display:'flex',gap:10,alignItems:'flex-start'}}><span style={{fontSize:18}}>{en.mood||'📝'}</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:11,color:'#4B5563'}}>{d.getDate()}. {MONTHS_DE[d.getMonth()]} {d.getFullYear()}</div><div style={{fontSize:12,color:'#9CA3AF',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{en.text||'(Kein Text)'}</div></div></div>)})}</div>}
  </div>);
}

function SettingsPanel({goals,setGoals}){
  const[saved,setSaved]=useState(false);
  const upG=(k,v)=>setGoals(p=>{const n={...p,[k]:v};saveGoals(n);return n});
  const flash=()=>{setSaved(true);setTimeout(()=>setSaved(false),1200)};
  const inp={background:'#0A0F1A',border:'1px solid #1F2937',borderRadius:8,padding:'10px 12px',color:'#E5E7EB',fontSize:14,fontFamily:"'DM Sans'",outline:'none',width:'100%'};
  const lbl={fontSize:12,color:'#6B7280',marginBottom:4,display:'block'};
  const row={display:'flex',gap:8,marginBottom:12};
  const card={background:'#111827',borderRadius:12,padding:16,marginBottom:12};
  return(<div style={{animation:'fadeIn .3s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><h2 style={{fontSize:18,fontWeight:700,color:'#E5E7EB',fontFamily:"'Playfair Display',serif"}}>⚙️ Einstellungen</h2>{saved&&<span style={{fontSize:12,color:'#10B981',fontWeight:600}}>✓ Gespeichert</span>}</div>
    <div style={card}><div style={{fontSize:14,fontWeight:700,color:'#E5E7EB',marginBottom:14}}>👤 Profil</div><label style={lbl}>Name (optional)</label><input value={goals.userName} onChange={e=>{upG('userName',e.target.value);flash()}} placeholder="Dein Name" style={{...inp,marginBottom:12}}/></div>

    </div>)}
    {activeTab==="calendar"&&(<div style={{animation:"fadeIn .3s"}}>
      <div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(calYear-1)}else setCalMonth(calMonth-1)}} style={S.calNav}>‹</button><span style={{fontSize:14,fontWeight:700,color:"#E5E7EB"}}>{MONTHS_DE[calMonth]} {calYear}</span><button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(calYear+1)}else setCalMonth(calMonth+1)}} style={S.calNav}>›</button></div><div style={S.calGrid}>{DAYS_DE.map(d=><div key={d} style={S.calHead}>{d}</div>)}{Array.from({length:firstDay(calYear,calMonth)}).map((_,i)=><div key={`e${i}`}/>)}{Array.from({length:daysInMonth(calYear,calMonth)}).map((_,i)=>{const d=new Date(calYear,calMonth,i+1);const k2=dk(d);const ht=(data.tasks[k2]||[]).length>0;const ad=(data.completed[k2]||[]).length===habits.length&&habits.length>0;const sel=isSame(d,selectedDate);const isT=isSame(d,today);return(<div key={i} onClick={()=>setSelectedDate(d)} style={{...S.calDay,background:sel?"#F59E0B":isT?"#1F2937":"transparent",color:sel?"#000":isT?"#F59E0B":"#D1D5DB",fontWeight:sel||isT?700:400,cursor:"pointer",position:"relative"}}>{i+1}{(ht||ad)&&<div style={{position:"absolute",bottom:1,left:"50%",transform:"translateX(-50%)",display:"flex",gap:2}}>{ad&&<div style={{width:4,height:4,borderRadius:"50%",background:"#10B981"}}/>}{ht&&<div style={{width:4,height:4,borderRadius:"50%",background:"#3B82F6"}}/>}</div>}</div>)})}</div></div>

      <div style={S.addForm}><input value={newTaskTime} onChange={e=>setNewTaskTime(e.target.value)} type="time" style={{...S.inp,width:100}}/><input value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Neue Aufgabe..." style={{...S.inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&addTask()}/><button onClick={addTask} style={S.addBtn}>+</button></div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>{dayTasks.length===0&&<div style={S.empty}>Keine Aufgaben</div>}{dayTasks.map((t,i)=>(<div key={t.id} style={{...S.taskItem,opacity:t.done?0.5:1,animation:`slideIn .3s ease ${i*.04}s both`}}><div style={{display:"flex",alignItems:"center",gap:8,flex:1}}><div onClick={()=>toggleTask(t.id)} style={{...S.chk,width:18,height:18,minWidth:18,background:t.done?"#3B82F6":"transparent",borderColor:t.done?"#3B82F6":"#4B5563",cursor:"pointer"}}>{t.done&&<span style={{color:"#fff",fontSize:11}}>✓</span>}</div>{t.time&&<span style={S.time}>{t.time}</span>}<span style={{textDecoration:t.done?"line-through":"none",color:t.done?"#4B5563":"#E5E7EB",fontSize:13}}>{t.text}</span></div><div style={{display:'flex',gap:4,alignItems:'center'}}><button onClick={()=>downloadICS(t,selectedDate)} style={S.icsBtn}>📲</button><button onClick={()=>deleteTask(t.id)} style={S.del}>×</button></div></div>))}</div>
      <div style={{...S.card,marginTop:16}}><div style={{fontSize:13,fontWeight:600,color:"#E5E7EB",marginBottom:8}}>📝 Tagesnotiz</div><textarea value={noteInput} onChange={e=>setNoteInput(e.target.value)} onBlur={saveNote} placeholder="Gedanken..." style={{...S.inp,width:"100%",minHeight:70,lineHeight:1.5}}/></div>

      <FoodPhotoEstimator onEstimate={r=>addMeal(r)}/>
      <div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:13,fontWeight:700,color:"#E5E7EB"}}>Makro-Übersicht</span><span style={{fontSize:11,color:"#4B5563"}}>Ziel: {G.kcal} kcal</span></div>{[{l:"Kalorien",v:totalCal,t:G.kcal,u:"kcal",col:"#F59E0B",ic:"🔥"},{l:"Protein",v:totalP,t:G.protein,u:"g",col:"#EF4444",ic:"🥩"},{l:"Kohlenhydrate",v:totalC,t:G.carbs,u:"g",col:"#3B82F6",ic:"🍞"},{l:"Fett",v:totalF,t:G.fat,u:"g",col:"#10B981",ic:"🥑"}].map(m=>(<div key={m.l} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:"#6B7280"}}>{m.ic} {m.l}</span><span style={{fontSize:11,fontWeight:600,color:m.v>m.t?"#EF4444":m.col}}>{m.v} / {m.t} {m.u}</span></div><div style={{height:5,background:"#0A0F1A",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:`${Math.min((m.v/m.t)*100,100)}%`,background:m.v>m.t?"#EF4444":m.col,transition:"width .4s"}}/></div></div>))}</div>
      <div style={S.secHead}><h2 style={S.secTitle}>Mahlzeiten</h2>{totalCal>0&&<span style={S.badge}>{totalCal} kcal</span>}</div>
      <div style={{...S.card,padding:10}}><div style={{display:"flex",gap:6,marginBottom:6}}><select value={newMealType} onChange={e=>setNewMealType(e.target.value)} style={{...S.inp,width:110,cursor:"pointer",fontSize:12}}><option value="meal">🍽 Mahlzeit</option><option value="snack">🥨 Snack</option><option value="sweet">🍬 Süßigkeit</option><option value="drink">🥤 Getränk</option></select><input value={newMeal} onChange={e=>setNewMeal(e.target.value)} placeholder="Was gegessen?" style={{...S.inp,flex:1,fontSize:12}}/></div><div style={{display:"flex",gap:4,alignItems:"center"}}><input value={newMealCal} onChange={e=>setNewMealCal(e.target.value)} placeholder="kcal" type="number" style={{...S.inp,flex:1,fontSize:11}}/><input value={newMealP} onChange={e=>setNewMealP(e.target.value)} placeholder="P" type="number" style={{...S.inp,flex:1,fontSize:11}}/><input value={newMealC} onChange={e=>setNewMealC(e.target.value)} placeholder="K" type="number" style={{...S.inp,flex:1,fontSize:11}}/><input value={newMealF} onChange={e=>setNewMealF(e.target.value)} placeholder="F" type="number" style={{...S.inp,flex:1,fontSize:11}} onKeyDown={e=>e.key==="Enter"&&addMeal()}/><button onClick={()=>addMeal()} style={S.addBtn}>+</button></div></div>
      {newMealType==="sweet"&&pct<100&&<div style={S.warn}>⚠️ Erst alle Habits erledigen!</div>}
      <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:8}}>{dayMeals.length===0&&<div style={S.empty}>Noch nichts getrackt</div>}{dayMeals.map((m,i)=>(<div key={m.id} style={{...S.mealItem,animation:`slideIn .3s ease ${i*.04}s both`,borderLeft:`3px solid ${m.type==="sweet"?"#F472B6":m.type==="snack"?"#FBBF24":m.type==="drink"?"#3B82F6":"#10B981"}`}}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{m.type==="sweet"?"🍬":m.type==="snack"?"🥨":m.type==="drink"?"🥤":"🍽"}</span><span style={{color:"#E5E7EB",fontSize:13}}>{m.name}</span></div><div style={{display:"flex",gap:4,marginLeft:24,marginTop:3,flexWrap:"wrap"}}>{m.cal&&<span style={{...S.macBadge,color:"#F59E0B",background:"#F59E0B18"}}>{m.cal} kcal</span>}{m.p&&<span style={{...S.macBadge,color:"#EF4444",background:"#EF444418"}}>{m.p}g P</span>}{m.c&&<span style={{...S.macBadge,color:"#3B82F6",background:"#3B82F618"}}>{m.c}g K</span>}{m.f&&<span style={{...S.macBadge,color:"#10B981",background:"#10B98118"}}>{m.f}g F</span>}</div></div><button onClick={()=>deleteMeal(m.id)} style={S.del}>×</button></div>))}</div>
    </div>)}
    {activeTab==="body"&&(<div style={{animation:"fadeIn .3s"}}>
      <div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:14,fontWeight:700,color:"#E5E7EB"}}>⚖️ Gewicht</span><span style={{fontSize:12,color:"#6B7280"}}>Ziel: {G.weightGoal} kg</span></div>{dayWeight?(<div style={{textAlign:"center",padding:"8px 0"}}><div style={{fontSize:36,fontWeight:900,color:dayWeight<=G.weightGoal?"#10B981":"#F59E0B",fontFamily:"'Playfair Display',serif"}}>{dayWeight} kg</div><div style={{fontSize:11,color:"#6B7280",marginTop:4}}>{dayWeight>G.weightGoal?`Noch ${(dayWeight-G.weightGoal).toFixed(1)} kg`:"🎉 Ziel erreicht!"}</div><button onClick={()=>upd(d=>{delete d.weight[key]})} style={{...S.del,marginTop:8,fontSize:11,color:"#4B5563"}}>Ändern</button></div>):(<div style={S.addForm}><input value={weightInput} onChange={e=>setWeightInput(e.target.value)} placeholder="kg" type="number" step="0.1" style={{...S.inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&saveWeight()}/><button onClick={saveWeight} style={S.addBtn}>✓</button></div>)}{weightHistory.length>1&&(<div style={{marginTop:16}}><div style={{fontSize:12,color:"#6B7280",marginBottom:8}}>Verlauf (30 Tage)</div><svg width="100%" viewBox="0 0 460 120" style={{overflow:"visible"}}>{(()=>{const ws=weightHistory.map(p=>p.weight);const mn=Math.min(...ws,G.weightGoal)-0.5;const mx=Math.max(...ws,G.weightStart)+0.5;const rng=mx-mn||1;const gy=110-((G.weightGoal-mn)/rng)*100;const pts=weightHistory.map((p,i)=>{const x=weightHistory.length>1?(i/(weightHistory.length-1))*440+10:230;const y=110-((p.weight-mn)/rng)*100;return{x,y}});return(<><line x1="0" y1={gy} x2="460" y2={gy} stroke="#10B981" strokeWidth="1" strokeDasharray="4,4" opacity="0.4"/><polyline points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke="#F59E0B" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={i===pts.length-1?5:3} fill={i===pts.length-1?"#F59E0B":"#1F2937"} stroke="#F59E0B" strokeWidth="2"/>)}<text x="455" y={gy-6} fill="#10B981" fontSize="10" textAnchor="end">{G.weightGoal}kg</text></>)})()}</svg></div>)}</div>
      <div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:14,fontWeight:700,color:"#E5E7EB"}}>😴 Schlaf</span><span style={{fontSize:12,color:"#6B7280"}}>Ziel: {G.sleepGoal}h</span></div>{daySleep?(<div><div style={{display:"flex",justifyContent:"space-around",textAlign:"center"}}><div><div style={{fontSize:10,color:"#6B7280"}}>Bett</div><div style={{fontSize:18,fontWeight:700,color:"#8B5CF6"}}>{daySleep.bed}</div></div><div><div style={{fontSize:10,color:"#6B7280"}}>Wach</div><div style={{fontSize:18,fontWeight:700,color:"#F59E0B"}}>{daySleep.wake}</div></div><div><div style={{fontSize:10,color:"#6B7280"}}>Dauer</div><div style={{fontSize:18,fontWeight:700,color:daySleep.hours>=G.sleepGoal?"#10B981":"#EF4444"}}>{daySleep.hours}h</div></div></div><div style={{textAlign:"center"}}><button onClick={()=>upd(d=>{delete d.sleep[key]})} style={{...S.del,marginTop:8,fontSize:11,color:"#4B5563"}}>Ändern</button></div></div>):(<div style={S.addForm}><div style={{display:"flex",alignItems:"center",gap:4,flex:1}}><span style={{fontSize:11,color:"#6B7280"}}>🌙</span><input value={sleepBed} onChange={e=>setSleepBed(e.target.value)} type="time" style={{...S.inp,flex:1}}/></div><div style={{display:"flex",alignItems:"center",gap:4,flex:1}}><span style={{fontSize:11,color:"#6B7280"}}>☀️</span><input value={sleepWake} onChange={e=>setSleepWake(e.target.value)} type="time" style={{...S.inp,flex:1}}/></div><button onClick={saveSleep} style={S.addBtn}>✓</button></div>)}</div>
      <div style={S.card}><div style={{fontSize:14,fontWeight:700,color:"#E5E7EB",marginBottom:12}}>🏋️ Workout</div><div style={{display:"flex",gap:6,marginBottom:6}}><select value={workoutType} onChange={e=>setWorkoutType(e.target.value)} style={{...S.inp,width:100,cursor:"pointer",fontSize:12}}><option value="kraft">💪 Kraft</option><option value="cardio">🏃 Cardio</option><option value="flex">🧘 Flex</option><option value="sport">⚽ Sport</option></select><input value={workoutDesc} onChange={e=>setWorkoutDesc(e.target.value)} placeholder="Was gemacht?" style={{...S.inp,flex:1,fontSize:12}} onKeyDown={e=>e.key==="Enter"&&addWorkout()}/><input value={workoutDur} onChange={e=>setWorkoutDur(e.target.value)} placeholder="Min" type="number" style={{...S.inp,width:52,fontSize:12}}/><button onClick={addWorkout} style={S.addBtn}>+</button></div><div style={{display:"flex",flexDirection:"column",gap:4}}>{dayWorkouts.length===0&&<div style={S.empty}>Kein Workout</div>}{dayWorkouts.map((w,i)=>(<div key={w.id} style={{...S.taskItem,animation:`slideIn .3s ease ${i*.04}s both`,borderLeft:`3px solid ${w.type==="kraft"?"#EF4444":w.type==="cardio"?"#F59E0B":w.type==="flex"?"#8B5CF6":"#3B82F6"}`}}><div style={{display:"flex",alignItems:"center",gap:8,flex:1}}><span style={{fontSize:16}}>{w.type==="kraft"?"💪":w.type==="cardio"?"🏃":w.type==="flex"?"🧘":"⚽"}</span><span style={{color:"#E5E7EB",fontSize:13}}>{w.desc}</span>{w.dur&&<span style={{...S.macBadge,color:"#9CA3AF",background:"#374151"}}>{w.dur} min</span>}</div><button onClick={()=>deleteWorkout(w.id)} style={S.del}>×</button></div>))}</div></div>
    </div>)}
    {activeTab==="journal"&&<Journal data={data} upd={upd} selectedDate={selectedDate}/>}
    {activeTab==="stats"&&(<div style={{animation:"fadeIn .3s"}}>
      <div style={S.secHead}><h2 style={S.secTitle}>Wochenstatistik</h2><span style={{fontSize:11,color:"#6B7280"}}>Letzte 7 Tage</span></div>
      <div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:13,fontWeight:600,color:"#E5E7EB"}}>📈 Habit-Disziplin</span><span style={{fontSize:22,fontWeight:900,color:weekStats.avgCompletion>=80?"#10B981":weekStats.avgCompletion>=50?"#F59E0B":"#EF4444",fontFamily:"'Playfair Display',serif"}}>{weekStats.avgCompletion}%</span></div><div style={{height:8,background:"#0A0F1A",borderRadius:4,overflow:"hidden",marginBottom:8}}><div style={{height:"100%",borderRadius:4,width:`${weekStats.avgCompletion}%`,background:weekStats.avgCompletion>=80?"#10B981":weekStats.avgCompletion>=50?"#F59E0B":"#EF4444"}}/></div><div style={{fontSize:12,color:"#6B7280"}}>{weekStats.habitDays}/7 Tage alles erledigt</div><div style={{display:"flex",gap:4,marginTop:12,justifyContent:"space-between"}}>{weekData.map((w,i)=>{const p=w.total>0?(w.done/w.total)*100:0;return(<div key={i} style={{flex:1,textAlign:"center"}}><div style={{height:48,background:"#0A0F1A",borderRadius:4,display:"flex",flexDirection:"column",justifyContent:"flex-end",overflow:"hidden"}}><div style={{height:`${Math.max(p,3)}%`,background:p===100?"#10B981":p>0?"#F59E0B":"#1F2937",borderRadius:4}}/></div><div style={{fontSize:9,color:"#6B7280",marginTop:3}}>{w.day}</div></div>)})}</div></div>
      <div style={S.card}><div style={{fontSize:13,fontWeight:600,color:"#E5E7EB",marginBottom:12}}>🍽 Ø Makros / Tag</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{[{l:"Kalorien",v:weekStats.avgCal,t:G.kcal,u:"kcal",col:"#F59E0B",ic:"🔥"},{l:"Protein",v:weekStats.avgP,t:G.protein,u:"g",col:"#EF4444",ic:"🥩"},{l:"Carbs",v:weekStats.avgC,t:G.carbs,u:"g",col:"#3B82F6",ic:"🍞"},{l:"Fett",v:weekStats.avgF,t:G.fat,u:"g",col:"#10B981",ic:"🥑"}].map(m=>(<div key={m.l} style={{background:"#0A0F1A",borderRadius:10,padding:12,textAlign:"center"}}><div style={{fontSize:10,color:"#6B7280",marginBottom:4}}>{m.ic} {m.l}</div><div style={{fontSize:20,fontWeight:700,color:m.v>m.t?"#EF4444":m.col,fontFamily:"'Playfair Display',serif"}}>{m.v}</div><div style={{fontSize:10,color:"#4B5563"}}>/ {m.t} {m.u}</div></div>))}</div></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div style={S.card}><div style={{fontSize:12,color:"#6B7280",marginBottom:4}}>😴 Ø Schlaf</div><div style={{fontSize:22,fontWeight:900,color:weekStats.avgSleep>=G.sleepGoal?"#10B981":"#F59E0B",fontFamily:"'Playfair Display',serif"}}>{weekStats.avgSleep?`${weekStats.avgSleep}h`:"–"}</div><div style={{fontSize:10,color:"#4B5563"}}>Ziel: {G.sleepGoal}h</div></div><div style={S.card}><div style={{fontSize:12,color:"#6B7280",marginBottom:4}}>🔥 Streak</div><div style={{fontSize:22,fontWeight:900,color:"#F59E0B",fontFamily:"'Playfair Display',serif"}}>{streak}</div><div style={{fontSize:10,color:"#4B5563"}}>Tage in Folge</div></div></div>
      {weightHistory.length>0&&(<div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,fontWeight:600,color:"#E5E7EB"}}>⚖️ Gewicht</span><div style={{textAlign:"right"}}><span style={{fontSize:22,fontWeight:900,color:"#F59E0B",fontFamily:"'Playfair Display',serif"}}>{weightHistory[weightHistory.length-1].weight} kg</span><div style={{fontSize:10,color:"#4B5563"}}>Ziel: {G.weightGoal} kg</div></div></div><div style={{height:6,background:"#0A0F1A",borderRadius:3,overflow:"hidden",marginTop:10}}><div style={{height:"100%",borderRadius:3,width:`${Math.max(0,Math.min(100,((G.weightStart-weightHistory[weightHistory.length-1].weight)/(G.weightStart-G.weightGoal))*100))}%`,background:"linear-gradient(90deg,#F59E0B,#10B981)"}}/></div><div style={{fontSize:10,color:"#6B7280",marginTop:4,textAlign:"center"}}>{(G.weightStart-weightHistory[weightHistory.length-1].weight).toFixed(1)} kg verloren · {Math.max(0,(weightHistory[weightHistory.length-1].weight-G.weightGoal)).toFixed(1)} kg übrig</div></div>)}
    </div>)}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
